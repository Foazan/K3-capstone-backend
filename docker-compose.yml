version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: k3_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: k3_epson
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  waha:
    image: devlikeapro/waha
    container_name: k3_waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=admin123

volumes:
  db_data:
